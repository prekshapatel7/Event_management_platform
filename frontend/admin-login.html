<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="form-container">

    <h2>Admin Login</h2>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button>
            Login
        </button>

    </form>

</div>

<script src="./js/admin-login.js"></script>

</body>
</html>
